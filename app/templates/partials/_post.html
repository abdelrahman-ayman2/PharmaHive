<article class="app-panel home-post-card">
  <div class="card-body p-4">
    
    <div class="d-flex justify-content-between align-items-start gap-3 mb-3">
      <div class="d-flex align-items-start gap-3">
        <a href="{{ url_for('users.profile', username=post.user.username) }}" class="avatar-link">
          <div class="home-post-avatar">
            {{ post.user.username[0]|upper }}
          </div>
        </a>

        <div>
          <a href="{{ url_for('users.profile', username=post.user.username) }}"
             class="text-decoration-none post-author">
            {{ post.user.username }}
          </a>
          <div class="post-date">
            {{ post.created_at.strftime('%b %d, %Y at %I:%M %p') }}
          </div>
        </div>
      </div>

      {% if user and post.user_id == user.id %}
      <div class="dropdown">
        <button class="btn post-menu-btn" type="button" data-bs-toggle="dropdown">
          ⋮
        </button>
        <ul class="dropdown-menu dropdown-menu-end border-0 shadow rounded-4">
          <li>
            <a class="dropdown-item" href="{{ url_for('posts.edit', post_id=post.id) }}">
              Edit post
            </a>
          </li>
          <li>
            <form method="POST" action="{{ url_for('posts.delete', post_id=post.id) }}">
              <input type="hidden" name="csrf_token" value="{{ token() }}">
              <input type="hidden" name="next_page" value="{{ request.path }}">
              <button type="submit" class="dropdown-item text-danger">
                Delete post
              </button>
            </form>
          </li>
        </ul>
      </div>
      {% endif %}
    </div>

    <div class="post-content mb-3">
      {{ post.content }}
    </div>

    <div class="post-footer d-flex justify-content-between align-items-center flex-wrap gap-3">
      <div class="d-flex gap-2 flex-wrap align-items-center">
        
        <button type="button"
                class="btn app-chip-btn like_update"
                data-post-id="{{ post.id }}">
          Like
        </button>

        <span class="post-like-count" id="likes-{{ post.id }}">
          {{ post.likes_count }}
        </span>

        <button class="btn app-chip-btn" type="button" disabled>
          Comment
        </button>
      </div>
    </div>

  </div>
</article>
