{% extends "base.html" %}

{% block title %}429 | Too Many Requests{% endblock %}

{% block body_class %}bg-light{% endblock %}

{% block body %}
<div class="container min-vh-100 d-flex align-items-center justify-content-center py-5">
  <div class="row justify-content-center w-100">
    <div class="col-lg-7 col-xl-6">
      <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
        <div class="card-body p-4 p-md-5 text-center">
          
          <div class="mb-3">
            <span class="badge text-bg-warning fs-6 px-3 py-2 rounded-pill">
              Error 429
            </span>
          </div>

          <h1 class="display-3 fw-bold text-dark mb-2">Slow down!</h1>
          <h2 class="h3 fw-semibold mb-3">Too many requests</h2>

          <p class="text-muted fs-5 mb-4">
            You’ve made too many requests in a short time.
            Please wait a moment and try again.
          </p>

          <div class="d-flex flex-column flex-sm-row gap-3 justify-content-center">
            <a href="{{ url_for('core.home') }}" class="btn btn-primary btn-lg px-4 rounded-3">
              Go Home
            </a>
          </div>

        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
