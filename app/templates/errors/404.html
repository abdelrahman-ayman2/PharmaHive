{% extends "base.html" %}

{% block title %}404 | Page Not Found{% endblock %}

{% block body_class %}bg-light{% endblock %}

{% block body %}
<div class="container min-vh-100 d-flex align-items-center justify-content-center py-5">
  <div class="row justify-content-center w-100">
    <div class="col-lg-7 col-xl-6">
      <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
        <div class="card-body p-4 p-md-5 text-center">
          <div class="mb-3">
            <span class="badge text-bg-danger fs-6 px-3 py-2 rounded-pill">Error 404</span>
          </div>

          <h1 class="display-3 fw-bold text-dark mb-2">Oops!</h1>
          <h2 class="h3 fw-semibold mb-3">Page not found</h2>

          <p class="text-muted fs-5 mb-4">
            The page you are looking for does not exist, may have been moved,
            or the URL may be incorrect.
          </p>

          <div class="d-flex flex-column flex-sm-row gap-3 justify-content-center">
            <a href="{{ url_for('core.home') }}" class="btn btn-primary btn-lg px-4 rounded-3">
              Go Home
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
